##############################################################
#  Nginx — Configuración para Laravel (PHP-FPM)
#  Archivo: docker/nginx/default.conf
##############################################################

server {
    listen 80;
    server_name localhost;

    # Raíz apunta al directorio public/ de Laravel (¡MUY IMPORTANTE!)
    root /var/www/html/public;
    index index.php index.html;

    # Charset
    charset utf-8;

    # Logs dentro del contenedor
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # -------------------------------------------------------
    # Regla principal de Laravel:
    # Si el archivo/directorio no existe → pasa a index.php
    # Esto es lo que hace funcionar las rutas de Laravel
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # -------------------------------------------------------
    # Procesamiento de archivos PHP por PHP-FPM
    # -------------------------------------------------------
    location ~ \.php$ {
        fastcgi_pass   app:9000;           # "app" = nombre del servicio en docker-compose
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        # Timeouts adecuados para procesos largos (colas, imports, etc.)
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 300;

        # Buffer para respuestas grandes
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
    }

    # -------------------------------------------------------
    # Bloquear acceso a archivos ocultos (.env, .git, etc.)
    # -------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # -------------------------------------------------------
    # Cache para assets estáticos
    # -------------------------------------------------------
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Tamaño máximo de upload (para formularios con archivos)
    client_max_body_size 100M;
}

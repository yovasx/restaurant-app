; =============================================================
;  PHP-FPM Pool — Configuración del worker para Laravel
;  Archivo: docker/php/php-fpm.conf
; =============================================================

[www]


; Socket de comunicación con Nginx
listen = 0.0.0.0:9000

; Modo dinámico: crea/elimina workers según la carga
pm = dynamic
pm.max_children      = 20
pm.start_servers     = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 5
pm.max_requests      = 500

; Logs de errores de FPM
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; Limpiar variables de entorno del host para seguridad
clear_env = no

; Habilitar status page (útil para monitoreo)
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

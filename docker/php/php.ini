; =============================================================
;  PHP — Configuración personalizada para Laravel en desarrollo
;  Archivo: docker/php/php.ini
; =============================================================

[PHP]
; ------- Errores (modo desarrollo: mostrar todo) -------
display_errors = On
display_startup_errors = On
error_reporting = E_ALL & ~E_USER_DEPRECATED & ~E_DEPRECATED
log_errors = On
error_log = /var/log/php_errors.log

; ------- Tiempos de ejecución -------
max_execution_time = 300
max_input_time = 300
default_socket_timeout = 300

; ------- Memoria -------
memory_limit = 512M

; ------- Uploads -------
upload_max_filesize = 100M
post_max_size = 100M
max_file_uploads = 20

; ------- OPcache (desarrollo: desactivado para ver cambios al instante) -------
opcache.enable = 0
opcache.enable_cli = 0

; ------- Zona horaria (ajusta según tu región) -------
date.timezone = America/La_Paz

; ------- Seguridad básica -------
expose_php = Off

; ------- Sesiones -------
session.gc_maxlifetime = 86400
session.cookie_httponly = On
